<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEEBEAV • Tesla Light Shows</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      text-align: center;
      line-height: 1.4;
    }

    /* Background Video */
    .video-bg-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      z-index: -2;
    }

    .video-bg {
      position: absolute;
      top: 50%; left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(0.75) contrast(1.1);
    }

    /* Dark Overlay for Readability */
    .video-bg-container::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      padding: 15% 20px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .tagline {
      font-size: 1.3rem;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    a {
      color: white;
      text-decoration: underline;
      font-weight: 500;
    }

    .btn {
      display: inline-block;
      margin: 30px 10px;
      padding: 14px 32px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 2px solid white;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1.1rem;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .links {
      margin: 40px 0;
      font-size: 1.1rem;
    }

    footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.95rem;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .tagline { font-size: 1.15rem; }
      .content { padding: 25% 20px 100px; }
    }
  </style>
</head>
<body>

  <div class="video-bg-container">
    <video class="video-bg" autoplay loop muted playsinline preload="none" poster="https://zeebeav.github.io/ZeeBeavLogoPatriotic.png">
      <source src="http://zeebeav.github.io/Sequence 01_3.mp4" type="video/mp4">
    </video>
  </div>

  <div class="content">
    <h1>ZEEBEAV</h1>
    <p class="tagline">BOLD • UNFORGETTABLE • FREE</p>

    <a href="mailto:zeebeav@gmail.com?subject=ZeeBeav Inquiry" class="btn">JOIN THE WAITLIST</a>

    <div class="links">
      <p><strong>FREE LIGHT SHOWS</strong><br>
      <a href="https://www.toybox.lol/zeebeav">ToyBox</a> • 
      <a href="https://xlightshows.io/light-shows/">Xlights</a> • 
      <a href="https://teslalightshare.io/4247/light-shows">TeslaShare</a></p>
    </div>

    <a href="https://smokehbearsden.com/products/zeebeav-blinky-shows-tee?variant=48170385080558" class="btn">SHOP $40 T'S</a>

    <footer>FOLLOW THE MOVEMENT</footer>
  </div>

</body>
</html>
