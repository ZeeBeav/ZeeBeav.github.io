    /* Background Video - Fixed & Stable */
    .video-bg-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      z-index: -2;

      filter: brightness(0.75) contrast(1.1);
    }

    /* Dark overlay for better text readability */
    .video-bg-container::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);

    }

    }

    .links {
      margin: 30px 0;
      font-size: 1.2rem;
      line-height: 2;
    }

    a {
      color: #fff;
      text-decoration: underline;
    }

    footer {
      margin-top: 50px;
      opacity: 0.85;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
